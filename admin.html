<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>激活码生成器 - 周报大师</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans SC",sans-serif;background:#f4f5f7;color:#1a1d23;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:#fff;border-radius:12px;padding:28px 24px;max-width:440px;width:100%;box-shadow:0 4px 12px rgba(0,0,0,.1)}
.card h2{font-size:18px;font-weight:700;margin-bottom:4px}
.card .sub{font-size:13px;color:#6b7280;margin-bottom:20px}
.card label{font-size:13px;font-weight:500;display:block;margin-bottom:6px}
.card input{width:100%;padding:10px 12px;border:1px solid #e2e4e8;border-radius:8px;font-size:14px;font-family:inherit;outline:none;margin-bottom:12px}
.card input:focus{border-color:#2563eb}
.card button{width:100%;padding:10px 24px;background:#2563eb;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;margin-bottom:16px}
.card button:hover{background:#1d4ed8}
.card button:disabled{opacity:.5;cursor:not-allowed}
.result{background:#f0fdf4;border:1px solid #86efac;border-radius:8px;padding:14px;display:none;margin-top:12px}
.result .label{font-size:12px;color:#065f46;margin-bottom:4px}
.result .code{font-size:20px;font-weight:700;color:#065f46;letter-spacing:1px;word-break:break-all}
.result .hint{font-size:12px;color:#065f46;margin-top:6px}
.err{background:#fee2e2;border:1px solid #fca5a5;color:#991b1b;border-radius:8px;padding:12px;font-size:13px;display:none;margin-top:12px}
.copy-btn{margin-top:8px;padding:6px 16px;background:#065f46;color:#fff;border:none;border-radius:6px;font-size:13px;cursor:pointer;display:inline-block}
.copy-btn:hover{opacity:.9}
.back-link{display:block;text-align:center;font-size:13px;color:#6b7280;margin-top:16px;text-decoration:none}
.back-link:hover{color:#2563eb}
</style>
</head>
<body>
<div class="card">
  <h2>激活码生成器</h2>
  <div class="sub">输入你的 Master Key 来生成新的客户激活码</div>
  <label for="masterInput">Master Key</label>
  <input type="password" id="masterInput" placeholder="输入 Master Key">
    <label>激活码类型</label>
  <div style="margin-bottom:12px;display:flex;gap:8px">
    <label style="flex:1;padding:10px;border:2px solid #2563eb;border-radius:8px;text-align:center;cursor:pointer;font-size:13px;background:#eff6ff;font-weight:500" id="proLabel">
      <input type="radio" name="codeType" value="pro" checked style="display:none">包月（无限使用）
    </label>
    <label style="flex:1;padding:10px;border:2px solid #e2e4e8;border-radius:8px;text-align:center;cursor:pointer;font-size:13px;background:#fff" id="usageLabel">
      <input type="radio" name="codeType" value="usage" style="display:none">按次（+5次）
    </label>
  </div>
<button id="genBtn" onclick="generateCode()">生成激活码</button>
  <div id="loading" style="text-align:center;font-size:13px;color:#6b7280;display:none">生成中...</div>
  <div class="result" id="result">
    <div class="label">新激活码</div>
    <div class="code" id="codeDisplay"></div>
    <button class="copy-btn" onclick="copyCode()">复制激活码</button>
    <div class="hint">将此激活码发送给客户，客户在周报大师输入即可解锁</div>
  </div>
  <div class="err" id="errorMsg"></div>
  <a href="/" class="back-link">← 返回周报大师</a>
</div>
<script>
document.querySelectorAll('input[name="codeType"]').forEach(function(r){r.addEventListener('change',function(){document.getElementById('proLabel').style.borderColor='#e2e4e8';document.getElementById('proLabel').style.background='#fff';document.getElementById('usageLabel').style.borderColor='#e2e4e8';document.getElementById('usageLabel').style.background='#fff';document.getElementById(this.value+'Label').style.borderColor='#2563eb';document.getElementById(this.value+'Label').style.background='#eff6ff'})});
async function generateCode(){
  var key=document.getElementById('masterInput').value.trim();
  if(!key){showErr('请输入 Master Key');return}
  document.getElementById('genBtn').disabled=true;
  document.getElementById('loading').style.display='block';
  document.getElementById('result').style.display='none';
  document.getElementById('errorMsg').style.display='none';
  try{
    var resp=await fetch('/api/generate-report?action=gen-code',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({key:key,type:document.querySelector('input[name=codeType]:checked').value})
    });
    var data=await resp.json();
    if(resp.ok&&data.code){
      document.getElementById('codeDisplay').textContent=data.code;
      document.getElementById('result').style.display='block';
      document.getElementById('loading').style.display='none';
    }else{
      showErr(data.error||'生成失败');
      document.getElementById('loading').style.display='none';
    }
  }catch(e){
    showErr('网络错误: '+e.message);
    document.getElementById('loading').style.display='none';
  }
  document.getElementById('genBtn').disabled=false;
}
function showErr(msg){var el=document.getElementById('errorMsg');el.textContent=msg;el.style.display='block'}
async function copyCode(){
  var code=document.getElementById('codeDisplay').textContent;
  try{await navigator.clipboard.writeText(code);alert('已复制')}catch(e){alert('复制失败，请手动复制')}
}
</script>
</body>
</html>
