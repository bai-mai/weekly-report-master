<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>激活码生成器</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans SC",sans-serif;background:#f4f5f7;color:#1a1d23;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:#fff;border-radius:12px;padding:28px 24px;max-width:440px;width:100%;box-shadow:0 4px 12px rgba(0,0,0,.1)}
.card h2{font-size:18px;margin-bottom:4px}
.card .sub{font-size:13px;color:#6b7280;margin-bottom:20px}
.card label{font-size:13px;font-weight:500;display:block;margin-bottom:6px;margin-top:12px}
.card input[type=password],.card input[type=text]{width:100%;padding:10px 12px;border:1px solid #e2e4e8;border-radius:8px;font-size:14px;outline:none;margin-bottom:12px}
.card input:focus{border-color:#2563eb}
.card button{width:100%;padding:10px 24px;background:#2563eb;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;margin-bottom:16px}
.card button:hover{background:#1d4ed8}
.type-row{display:flex;gap:8px;margin-bottom:12px}
.type-row label{flex:1;padding:10px;border:2px solid #e2e4e8;border-radius:8px;text-align:center;cursor:pointer;font-size:13px;background:#fff;margin:0}
.type-row label.active{border-color:#2563eb;background:#eff6ff;font-weight:500}
.result{background:#f0fdf4;border:1px solid #86efac;border-radius:8px;padding:14px;display:none;margin-top:12px}
.result .label{font-size:12px;color:#065f46;margin-bottom:4px}
.result .code{font-size:20px;font-weight:700;color:#065f46;letter-spacing:1px;word-break:break-all}
.result .hint{font-size:12px;color:#065f46;margin-top:6px}
.err{background:#fee2e2;border:1px solid #fca5a5;border-radius:8px;padding:12px;font-size:13px;display:none;margin-top:12px;color:#991b1b}
.copy-btn{margin-top:8px;padding:6px 16px;background:#065f46;color:#fff;border:none;border-radius:6px;font-size:13px;cursor:pointer}
.back-link{display:block;text-align:center;font-size:13px;color:#6b7280;margin-top:16px;text-decoration:none}
</style>
</head>
<body>
<div class="card">
<h2>激活码生成器</h2>
<div class="sub">客户付款后，在此生成激活码</div>
<label>Master Key</label>
<input type="password" id="masterInput" placeholder="输入你的 Master Key">
<label>激活码类型</label>
<div class="type-row">
<label id="proLabel" class="active" onclick="selectType('pro')"><input type="radio" name="t" value="pro" checked style="display:none">包月（无限使用）<br><small style="color:#6b7280">售价 9.9 元</small></label>
<label id="usageLabel" onclick="selectType('usage')"><input type="radio" name="t" value="usage" style="display:none">按次（+5次）<br><small style="color:#6b7280">售价 0.5 元</small></label>
</div>
<button id="genBtn" onclick="generateCode()">生成激活码</button>
<div id="loading" style="text-align:center;font-size:13px;color:#6b7280;display:none">生成中...</div>
<div class="result" id="result"><div class="label">新激活码</div><div class="code" id="codeDisplay"></div><button class="copy-btn" onclick="copyCode()">复制</button><div class="hint">将此激活码发给客户，客户在周报大师输入即可解锁</div></div>
<div class="err" id="errorMsg"></div>
<a href="/" class="back-link">← 返回周报大师</a>
</div>
<script>
function selectType(t){document.getElementById('proLabel').className='';document.getElementById('usageLabel').className='';document.getElementById(t+'Label').className='active';document.querySelector('input[name=t][value='+t+']').checked=true}
async function generateCode(){var key=document.getElementById('masterInput').value.trim();if(!key){showErr('请输入 Master Key');return}var type=document.querySelector('input[name=t]:checked').value;document.getElementById('genBtn').disabled=true;document.getElementById('loading').style.display='block';hideErr();hideResult();try{var r=await fetch('/api/generate-report?action=gen-code',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({key:key,type:type})});var d=await r.json();if(r.ok&&d.code){showResult(d.code)}else{showErr(d.error||'生成失败')}}catch(e){showErr('网络错误')}document.getElementById('genBtn').disabled=false;document.getElementById('loading').style.display='none'}
function showResult(c){document.getElementById('codeDisplay').textContent=c;document.getElementById('result').style.display='block'}
function hideResult(){document.getElementById('result').style.display='none'}
function showErr(m){var e=document.getElementById('errorMsg');e.textContent=m;e.style.display='block'}
function hideErr(){document.getElementById('errorMsg').style.display='none'}
async function copyCode(){try{await navigator.clipboard.writeText(document.getElementById('codeDisplay').textContent)}catch(e){}}
</script>
</body>
</html>
