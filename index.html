<style>
/* ===== Reset & Base ===== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f4f5f7;
  --surface:#ffffff;
  --border:#e2e4e8;
  --text:#1a1d23;
  --text-secondary:#6b7280;
  --primary:#2563eb;
  --primary-hover:#1d4ed8;
  --primary-light:#eff6ff;
  --radius:8px;
  --shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.06);
  --shadow-lg:0 4px 12px rgba(0,0,0,.1);
  --max-w:680px;
  --font:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans SC","PingFang SC",sans-serif;
}
html{font-size:16px}
body{
  font-family:var(--font);
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  line-height:1.6;
  -webkit-font-smoothing:antialiased;
}
/* ===== Header ===== */
.header{
  background:var(--surface);
  border-bottom:1px solid var(--border);
  padding:0 20px;
  height:56px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  position:sticky;
  top:0;
  z-index:10;
}
.header-brand{
  display:flex;
  align-items:center;
  gap:8px;
  font-weight:600;
  font-size:17px;
  color:var(--text);
}
.header-brand svg{color:var(--primary)}
.header-actions{display:flex;gap:4px}
.icon-btn{
  background:transparent;
  border:none;
  width:36px;
  height:36px;
  border-radius:var(--radius);
  display:flex;
  align-items:center;
  justify-content:center;
  color:var(--text-secondary);
  cursor:pointer;
  position:relative;
  transition:background .15s,color .15s;
}
.icon-btn:hover{background:#f0f1f3;color:var(--text)}
.icon-btn[data-tooltip]:hover::after{
  content:attr(data-tooltip);
  position:absolute;
  bottom:-28px;
  left:50%;
  transform:translateX(-50%);
  background:#1a1d23;
  color:#fff;
  font-size:12px;
  padding:3px 8px;
  border-radius:4px;
  white-space:nowrap;
  pointer-events:none;
  z-index:20;
}
/* ===== Main Layout ===== */
.container{
  max-width:var(--max-w);
  margin:0 auto;
  padding:32px 20px 80px;
}
/* ===== Section Headings ===== */
.section-label{
  font-size:13px;
  font-weight:600;
  color:var(--text-secondary);
  text-transform:uppercase;
  letter-spacing:.04em;
  margin-bottom:8px;
}
/* ===== Textarea ===== */
.input-card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:16px;
  margin-bottom:20px;
  box-shadow:var(--shadow);
}
.input-card textarea{
  width:100%;
  min-height:160px;
  border:none;
  outline:none;
  resize:vertical;
  font-family:var(--font);
  font-size:14px;
  line-height:1.7;
  color:var(--text);
  background:transparent;
  padding:0;
}
.input-card textarea::placeholder{color:#adb5bd}
.input-card .char-count{
  font-size:12px;
  color:var(--text-secondary);
  text-align:right;
  margin-top:6px;
}
/* ===== Controls Row ===== */
.controls-row{
  display:flex;
  gap:16px;
  margin-bottom:24px;
  flex-wrap:wrap;
}
.control-group{
  flex:1;
  min-width:180px;
}
.control-group label{
  display:block;
  font-size:13px;
  font-weight:500;
  color:var(--text-secondary);
  margin-bottom:6px;
}
.segmented{
  display:flex;
  border:1px solid var(--border);
  border-radius:var(--radius);
  overflow:hidden;
  background:var(--surface);
}
.segmented button{
  flex:1;
  border:none;
  background:transparent;
  padding:7px 12px;
  font-size:13px;
  font-family:var(--font);
  color:var(--text-secondary);
  cursor:pointer;
  transition:all .15s;
  white-space:nowrap;
}
.segmented button:not(:last-child){border-right:1px solid var(--border)}
.segmented button.active{
  background:var(--primary);
  color:#fff;
  font-weight:500;
}
.segmented button:not(.active):hover{background:#f8f9fa}
/* ===== Generate Button ===== */
.generate-wrap{margin-bottom:32px}
.btn-primary{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  width:100%;
  padding:12px 24px;
  border:none;
  border-radius:var(--radius);
  background:var(--primary);
  color:#fff;
  font-size:15px;
  font-weight:600;
  font-family:var(--font);
  cursor:pointer;
  transition:background .15s,transform .1s;
}
.btn-primary:hover{background:var(--primary-hover)}
.btn-primary:active{transform:scale(.98)}
.btn-primary:disabled{opacity:.5;cursor:not-allowed;transform:none}
.btn-primary .spinner{
  width:18px;height:18px;
  border:2px solid rgba(255,255,255,.3);
  border-top-color:#fff;
  border-radius:50%;
  animation:spin .6s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
/* ===== Output ===== */
.output-card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius);
  box-shadow:var(--shadow);
  overflow:hidden;
}
.output-header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:12px 16px;
  border-bottom:1px solid var(--border);
  background:#fafbfc;
}
.output-header .label{
  font-size:13px;
  font-weight:600;
  color:var(--text-secondary);
}
.output-actions{display:flex;gap:4px}
.output-body{
  padding:20px 24px;
  font-size:14px;
  line-height:1.8;
  color:var(--text);
  white-space:pre-wrap;
  word-wrap:break-word;
}
.output-body .report-section{
  margin-bottom:20px;
}
.output-body .report-section:last-child{margin-bottom:0}
.output-body .report-section h3{
  font-size:14px;
  font-weight:600;
  color:var(--primary);
  margin-bottom:8px;
  padding-bottom:4px;
  border-bottom:1px solid var(--border);
}
.output-body .report-section ul{
  padding-left:20px;
  margin:0;
}
.output-body .report-section li{margin-bottom:4px}
.output-empty{
  text-align:center;
  padding:40px 24px;
  color:var(--text-secondary);
  font-size:14px;
}
.output-empty svg{
  width:40px;height:40px;
  margin-bottom:12px;
  color:var(--border);
}
/* ===== Modal ===== */
.modal-overlay{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.3);
  z-index:100;
  align-items:center;
  justify-content:center;
  padding:20px;
}
.modal-overlay.open{display:flex}
.modal{
  background:var(--surface);
  border-radius:12px;
  width:100%;
  max-width:440px;
  box-shadow:var(--shadow-lg);
  padding:24px;
  position:relative;
}
.modal h2{
  font-size:16px;
  font-weight:600;
  margin-bottom:4px;
}
.modal p{
  font-size:13px;
  color:var(--text-secondary);
  margin-bottom:20px;
  line-height:1.5;
}
.modal .form-group{margin-bottom:16px}
.modal .form-group label{
  display:block;
  font-size:13px;
  font-weight:500;
  margin-bottom:6px;
}
.modal .form-group input{
  width:100%;
  padding:10px 12px;
  border:1px solid var(--border);
  border-radius:var(--radius);
  font-size:14px;
  font-family:var(--font);
  outline:none;
  transition:border-color .15s;
}
.modal .form-group input:focus{border-color:var(--primary)}
.modal .modal-actions{
  display:flex;
  gap:8px;
  justify-content:flex-end;
  margin-top:20px;
}
.modal .modal-actions button{
  padding:8px 20px;
  border-radius:var(--radius);
  font-size:14px;
  font-family:var(--font);
  cursor:pointer;
  transition:all .15s;
}
.modal .btn-secondary{
  border:1px solid var(--border);
  background:transparent;
  color:var(--text);
}
.modal .btn-secondary:hover{background:#f8f9fa}
.modal .btn-primary-sm{
  border:none;
  background:var(--primary);
  color:#fff;
  font-weight:500;
}
.modal .btn-primary-sm:hover{background:var(--primary-hover)}
.modal .status-badge{
  display:inline-block;
  font-size:12px;
  padding:2px 8px;
  border-radius:4px;
  margin-top:8px;
}
.modal .status-badge.ok{background:#d1fae5;color:#065f46}
.modal .status-badge.err{background:#fee2e2;color:#991b1b}
.modal-close{
  position:absolute;
  top:16px;right:16px;
  background:transparent;
  border:none;
  color:var(--text-secondary);
  cursor:pointer;
  width:32px;height:32px;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:var(--radius);
}
.modal-close:hover{background:#f0f1f3}
/* ===== Toast ===== */
.toast{
  position:fixed;
  bottom:24px;
  left:50%;
  transform:translateX(-50%) translateY(80px);
  background:#1a1d23;
  color:#fff;
  font-size:13px;
  padding:10px 20px;
  border-radius:var(--radius);
  opacity:0;
  transition:all .3s;
  pointer-events:none;
  z-index:200;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
/* ===== Responsive ===== */
@media(max-width:560px){
  .container{padding:20px 16px 80px}
  .controls-row{flex-direction:column;gap:12px}
  .control-group{min-width:0}
  .output-body{padding:16px}
  .segmented button{padding:7px 8px;font-size:12px}
}
</style>
</head>
<body>

<script>
// ===== Lucide Icons =====
lucide.createIcons();
// ===== DOM refs =====
const inputText = document.getElementById('inputText');
const charCount = document.getElementById('charCount');
const generateBtn = document.getElementById('generateBtn');
const outputBody = document.getElementById('outputBody');
const copyBtn = document.getElementById('copyBtn');
const regenerateBtn = document.getElementById('regenerateBtn');
const toastEl = document.getElementById('toast');
// ===== Segmented Control =====
document.querySelectorAll('.segmented').forEach(group => {
  group.querySelectorAll('button').forEach(btn => {
    btn.addEventListener('click', () => {
      group.querySelectorAll('button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    });
  });
});
// ===== Char Count =====
inputText.addEventListener('input', () => {
  const len = inputText.value.length;
  charCount.textContent = len;
});
// ===== Toast Helper =====
let toastTimer = null;
function showToast(msg){
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toastEl.classList.remove('show'), 2500);
}
// ===== API Key persistence =====
// ===== Backend Proxy call =====
async function callProxy(prompt){
  const resp = await fetch('/api/generate-report', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ prompt })
  });
  if(!resp.ok){
    const err = await resp.json();
    throw new Error(err.error || `璇锋眰澶辫触 (${resp.status})`);
  }
  const data = await resp.json();
  const text = data.candidates?.[0]?.content?.parts?.[0]?.text || '';
  return text;
}
// ===== Build Prompt =====
function buildPrompt(input, tone, role){
  return `浣犳槸涓€涓笓涓氱殑鍛ㄦ姤鍐欎綔鍔╂墜銆傛牴鎹敤鎴锋彁渚涚殑闆舵暎宸ヤ綔璁板綍锛岀敓鎴愪竴浠界粨鏋勬竻鏅般€佽〃杈句笓涓氱殑鍛ㄦ姤銆?
鍛ㄦ姤鍖呭惈浠ヤ笅涓変釜閮ㄥ垎锛?1. 鏈懆宸ヤ綔鍐呭 - 灏嗙敤鎴锋彁渚涚殑宸ヤ綔璁板綍鏁寸悊鎴愭湁鏉＄悊鐨勬弿杩帮紝鐢ㄩ」鐩鍙峰垪鍑?2. 鍏抽敭鎴愭灉 - 鎻愮偧鏈懆鏈€涓昏鐨勫伐浣滄垚鏋滐紝鐢ㄦ暟鎹垨鍏蜂綋浜嬪疄鏀拺
3. 涓嬪懆璁″垝 - 鍩轰簬鏈懆宸ヤ綔鎺ㄦ祴鍚堢悊鐨勪笅鍛ㄥ伐浣滆鍒掞紝2-3鏉★紝鐢ㄩ」鐩鍙峰垪鍑?
璇皵椋庢牸锛?{tone}
- 姝ｅ紡锛氭爣鍑嗚亴鍦虹敤璇紝鎺緸涓ヨ皑
- 绠€娲侊細鍙閲嶇偣锛屾瘡閮ㄥ垎2-3鍙ヨ瘽
- 閭€鍔熺増锛氱獊鍑轰釜浜鸿础鐚拰浠峰€硷紝閫傚綋鍖呰鎴愭灉

瑙掕壊锛?{role}
- 鏅€氬憳宸ワ細浠庢墽琛岃€呰瑙掓弿杩?- 绠＄悊鑰咃細浠庡洟闃熺鐞嗗拰鍐崇瓥瑙嗚鎻忚堪
- 鑷敱鑱屼笟鑰咃細浠庨」鐩氦浠樺拰瀹㈡埛瑙嗚鎻忚堪

鐩存帴杈撳嚭鍛ㄦ姤鍐呭锛屼笉瑕佽緭鍑洪澶栬鏄庛€傜敤 markdown 鏍煎紡杈撳嚭锛岀浜岄儴鍒嗗拰绗笁閮ㄥ垎鐨勬爣棰樼敤 ###銆?
鐢ㄦ埛鐨勫伐浣滆褰曪細
${input}`;
}
// ===== Format Output =====
function formatOutput(text){
  let html = '';
  const lines = text.split('\n');
  let currentSection = null;
  let sectionContent = [];
  function flushSection(){
    if(currentSection && sectionContent.length > 0){
      html += `<div class="report-section"><h3>${currentSection}</h3>`;
      const joined = sectionContent.join('\n');
      if(/^[-*]\s/m.test(joined)){
        html += '<ul>';
        sectionContent.forEach(line => {
          if(/^[-*]\s/.test(line.trim())){
            html += `<li>${line.trim().replace(/^[-*]\s/, '')}</li>`;
          } else if(line.trim()){
            html += `<li>${line.trim()}</li>`;
          }
        });
        html += '</ul>';
      } else {
        sectionContent.forEach(line => {
          if(line.trim()) html += `<p>${line.trim()}</p>`;
        });
      }
      html += '</div>';
    }
    sectionContent = [];
  }
  lines.forEach(line => {
    if(/^###\s/.test(line.trim())){
      flushSection();
      currentSection = line.trim().replace(/^###\s*/, '');
    } else if(currentSection){
      sectionContent.push(line);
    } else {
      if(line.trim()) html += `<p>${line.trim()}</p>`;
    }
  });
  flushSection();
  if(!html) html = `<div class="report-section"><p>${text.replace(/\n/g, '<br>')}</p></div>`;
  return html;
}
// ===== Generate =====
async function generate(){
  const input = inputText.value.trim();
  if(!input){
    showToast('璇疯緭鍏ヨ繖鍛ㄧ殑宸ヤ綔鍐呭');
    inputText.focus();
    return;
  }
  const tone = document.querySelector('#toneGroup .active')?.dataset?.value || '姝ｅ紡';
  const role = document.querySelector('#roleGroup .active')?.dataset?.value || '鏅€氬憳宸?;
  generateBtn.disabled = true;
  generateBtn.innerHTML = '<div class="spinner"></div><span>鐢熸垚涓?..</span>';
  outputBody.innerHTML = '<div class="output-empty"><div class="spinner" style="margin:0 auto 12px"></div>姝ｅ湪鐢熸垚鍛ㄦ姤...</div>';
  copyBtn.style.display = 'none';
  regenerateBtn.style.display = 'none';
  try {
    const prompt = buildPrompt(input, tone, role);
    const result = await callProxy(prompt);
    const html = formatOutput(result);
    outputBody.innerHTML = html;
    copyBtn.style.display = '';
    regenerateBtn.style.display = '';
    showToast('鍛ㄦ姤鐢熸垚瀹屾垚');
  } catch(err){
    outputBody.innerHTML = `
      <div class="output-empty">
        <i data-lucide="alert-circle" width="40" height="40" style="display:block;margin:0 auto 12px;color:#ef4444"></i>
        <div style="color:#991b1b;font-weight:500;margin-bottom:4px">鐢熸垚澶辫触</div>
        <div style="font-size:13px">${err.message}</div>
      </div>`;
    lucide.createIcons();
    showToast('鐢熸垚澶辫触: ' + err.message);
  } finally {
    generateBtn.disabled = false;
    generateBtn.innerHTML = '<i data-lucide="wand-sparkles" width="18" height="18"></i><span>鐢熸垚鍛ㄦ姤</span>';
    lucide.createIcons();
  }
}
generateBtn.addEventListener('click', generate);
regenerateBtn.addEventListener('click', generate);
// ===== Copy =====
copyBtn.addEventListener('click', async () => {
  const text = outputBody.textContent || '';
  if(!text.trim()){
    showToast('娌℃湁鍐呭鍙鍒?);
    return;
  }
  try {
    await navigator.clipboard.writeText(text.trim());
    const icon = copyBtn.querySelector('i');
    icon.setAttribute('data-lucide', 'check');
    lucide.createIcons();
    showToast('宸插鍒跺埌鍓创鏉?);
    setTimeout(() => {
      icon.setAttribute('data-lucide', 'clipboard');
      lucide.createIcons();
    }, 1500);
  } catch(e){
    showToast('澶嶅埗澶辫触锛岃鎵嬪姩澶嶅埗');
  }
});
// ===== Keyboard shortcut =====
document.addEventListener('keydown', (e) => {
  if((e.ctrlKey || e.metaKey) && e.key === 'Enter'){
    e.preventDefault();
    generate();
  }
});
// ===== Init =====
lucide.createIcons();
</script>
</body>
</html>
